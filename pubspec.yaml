name: allergyguard
description: AllergyGuard - Verifica allergeni da etichette alimentari
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Database locale
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0

  # Backend
  supabase_flutter: ^2.5.0

  # OCR & Camera
  google_mlkit_text_recognition: ^0.13.0
  google_mlkit_barcode_scanning: ^0.12.0
  camera: ^0.10.5

  # Text-to-Speech
  flutter_tts: ^4.0.2

  # HTTP
  dio: ^5.4.0

  # Utilities
  shared_preferences: ^2.2.0
  permission_handler: ^11.3.0
  uuid: ^4.3.0
  intl: ^0.19.0
  json_annotation: ^4.8.0
  equatable: ^2.0.5
  flutter_dotenv: ^5.1.0
  path_provider: ^2.1.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.0
  mockito: ^5.4.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/allergens/
