<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AllergyGuard</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #1976D2, #1565C0);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  h1 { font-size: 48px; margin: 16px 0 8px; }
  p.tag { font-size: 20px; opacity: 0.9; margin: 0 0 32px; }
  .links a {
    display: inline-block;
    margin: 8px;
    padding: 12px 24px;
    background: rgba(255,255,255,0.15);
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 500;
    border: 1px solid rgba(255,255,255,0.3);
    transition: background 0.2s;
  }
  .links a:hover { background: rgba(255,255,255,0.25); }
  footer { margin-top: 48px; opacity: 0.7; font-size: 14px; }
</style>
</head>
<body>
  <h1>AllergyGuard</h1>
  <p class="tag">Scan. Check. Eat safely.</p>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="https://github.com/frengo1972/AllergyGuard">GitHub</a>
  </div>
  <footer>
    Decision-support tool for food allergen verification · Not a medical device
  </footer>
</body>
</html>
