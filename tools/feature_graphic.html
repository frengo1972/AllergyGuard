<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>AllergyGuard — Feature Graphic</title>
<style>
  /* Screenshot questa pagina a risoluzione esatta 1024x500 per ottenere
     il feature graphic Play Store.
     Metodo veloce:
       1. Apri in Chrome.
       2. DevTools (F12) -> Device Toolbar (Ctrl+Shift+M).
       3. Custom size: 1024 x 500.
       4. Click 3 puntini DevTools -> Capture screenshot.
     Output PNG pronto da caricare su Play Console. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .banner {
    width: 1024px;
    height: 500px;
    background: linear-gradient(135deg, #1976D2 0%, #1565C0 60%, #43A047 100%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 0 64px;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .banner::before {
    content: "";
    position: absolute;
    right: -120px;
    top: -120px;
    width: 480px;
    height: 480px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .banner::after {
    content: "";
    position: absolute;
    right: 60px;
    bottom: -160px;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .left {
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .title {
    font-size: 64px;
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1;
  }
  .subtitle {
    font-size: 28px;
    font-weight: 500;
    opacity: 0.92;
    line-height: 1.25;
  }
  .tagline {
    font-size: 18px;
    opacity: 0.85;
    font-weight: 400;
    margin-top: 8px;
  }
  .shield {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    font-size: 16px;
    opacity: 0.95;
  }
  .shield svg { width: 22px; height: 22px; }
  .right {
    z-index: 1;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .phone {
    width: 240px;
    height: 440px;
    background: #0d47a1;
    border-radius: 28px;
    padding: 8px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    border: 3px solid rgba(255,255,255,0.2);
  }
  .screen {
    width: 100%;
    height: 100%;
    background: #D32F2F;
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    padding: 20px;
    gap: 12px;
  }
  .screen .icon {
    font-size: 72px;
  }
  .screen .label {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .screen .allergen {
    font-size: 14px;
    opacity: 0.9;
    text-align: center;
    line-height: 1.3;
  }
  .badges {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .badge {
    background: rgba(255,255,255,0.2);
    padding: 4px 10px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="left">
      <div class="title">AllergyGuard</div>
      <div class="subtitle">Scansiona.<br>Controlla. Sicuro.</div>
      <div class="tagline">Rileva allergeni da etichette e barcode.</div>
      <div class="shield">
        <svg viewBox="0 0 24 24" fill="white"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
        100% anonimo — niente account, niente pubblicità
      </div>
    </div>
    <div class="right">
      <div class="phone">
        <div class="screen">
          <div class="icon">⚠️</div>
          <div class="label">PERICOLO</div>
          <div class="allergen">Glutine rilevato<br>nell'etichetta</div>
          <div class="badges">
            <div class="badge">OCR</div>
            <div class="badge">TTS</div>
            <div class="badge">OFFLINE</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
